name: ci

# Merge gate complementing fallow.yml (which audits changed-file quality). This runs the
# type-check, lint, unit tests + coverage, build, browser-component tests, and e2e smoke.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run prepare # svelte-kit sync — generates $lib aliases + tsconfig
      - name: Type-check (svelte-check)
        run: bun run check
      - name: Lint
        run: bun run lint
      - name: Unit tests + coverage
        run: bun run test:coverage
      - name: Build (static SPA)
        run: bun run pregen && bun run build

  browser-e2e:
    name: component + e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run prepare
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
      - name: Component tests (Vitest browser mode)
        run: bun run test:browser
      - name: E2E (Playwright)
        run: bun run test:e2e
