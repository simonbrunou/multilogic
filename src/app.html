<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply saved theme and language before first paint: dark-mode users never see a
			// light flash, and the document lang matches the chosen locale so screen readers use
			// the right pronunciation from first render (the static markup defaults to fr).
			try {
				var s = JSON.parse(localStorage.getItem('ml:settings') || '{}');
				if (s.theme === 'dark') document.documentElement.dataset.theme = 'dark';
				var lang = localStorage.getItem('ml:lang');
				if (lang === 'en' || lang === 'fr') document.documentElement.lang = lang;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
